name: Autograding

# Runs on every push and PR. Tests Q1, Q2, Q3 sequentially in one job.
# Single job avoids reinstalling ROS repeatedly and keeps runtime predictable.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  autograde:
    name: "Autograding (Q1 + Q2 + Q3)"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.actor != 'github-classroom[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up ROS 2 Jazzy (headless)
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Baseline Python/ROS diagnostics
        shell: bash
        run: |
          set +e
          source /opt/ros/jazzy/setup.bash
          echo "PATH=$PATH"
          echo "which python3: $(which python3)"
          python3 --version
          python3 -m pip --version
          python3 -c "import importlib.util, os, sys; spec = importlib.util.find_spec('ament_package'); print('sys.executable:', sys.executable); print('PYTHONPATH:', os.environ.get('PYTHONPATH', '')); print('ament_package:', spec.origin if spec else 'MISSING')"
          exit 0

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m pip install --user mujoco==3.4.0

      - name: Build all packages (mujoco_ros2_bridge, a2_common, q1, q2, q3)
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          # Force non-PowerShell colcon shell handling on Linux runners.
          export COLCON_EXTENSION_BLOCKLIST=colcon_powershell.shell.powershell
          echo "COLCON_EXTENSION_BLOCKLIST=$COLCON_EXTENSION_BLOCKLIST"
          # Direct guard: keep ROS underlay on PYTHONPATH during this build step.
          export PYTHONPATH=/opt/ros/jazzy/lib/python3.12/site-packages${PYTHONPATH:+:$PYTHONPATH}
          echo "PYTHONPATH before build: $PYTHONPATH"
          python3 -c "import os, site; print('ENABLE_USER_SITE:', site.ENABLE_USER_SITE); print('PYTHONNOUSERSITE:', os.environ.get('PYTHONNOUSERSITE', ''))"
          python3 -c "import ament_package; print('ament_package OK')"
          python3 -c "import mujoco; print('mujoco OK')" || echo "WARNING: mujoco not importable before build"
          colcon build --symlink-install \
            --executor sequential \
            --event-handlers console_direct+ \
            --packages-select mujoco_ros2_bridge a2_common q1 q2 q3

      - name: Diagnose Python/ROS environment post-build
        if: always()
        shell: bash
        run: |
          set +e

          probe() {
            local label="$1"
            echo ""
            echo "== $label =="
            python3 -c "import importlib.util, os, sys; spec = importlib.util.find_spec('ament_package'); print('sys.executable:', sys.executable); print('sys.version:', sys.version.replace('\\n', ' ')); print('PYTHONPATH:', os.environ.get('PYTHONPATH', '')); print('sys.path:'); [print('  ', p) for p in sys.path]; print('ament_package:', spec.origin if spec else 'MISSING')"
            local rc=$?
            echo "probe_rc=$rc"
            return $rc
          }

          source /opt/ros/jazzy/setup.bash
          echo "which python3: $(which python3)"
          python3 --version
          probe "After /opt/ros/jazzy/setup.bash" || true

          if [ -f install/a2_common/share/a2_common/local_setup.bash ]; then
            source install/a2_common/share/a2_common/local_setup.bash
            echo "which python3 after a2_common package hook: $(which python3)"
            probe "After install/a2_common/share/a2_common/local_setup.bash" || true
          else
            echo "Missing install/a2_common/share/a2_common/local_setup.bash"
          fi

          if [ -f install/setup.bash ]; then
            source install/setup.bash
            echo "which python3 after workspace overlay: $(which python3)"
            probe "After install/setup.bash" || true
          else
            echo "Missing install/setup.bash"
          fi

          echo ""
          echo "== Selected environment vars =="
          env | sort | grep -E '^(AMENT|COLCON|PYTHON|ROS)_' || true

          echo ""
          echo "== a2_common hook files =="
          find install/a2_common -maxdepth 5 -type f \( -name '*.dsv' -o -name '*.sh' \) | sort
          for f in \
            install/a2_common/share/a2_common/package.dsv \
            install/a2_common/share/a2_common/local_setup.sh \
            install/a2_common/share/a2_common/local_setup.bash \
            install/a2_common/share/a2_common/hook/pythonpath.dsv
          do
            if [ -f "$f" ]; then
              echo ""
              echo "----- $f -----"
              sed -n '1,200p' "$f"
            fi
          done

          # Informational only — does not affect subsequent steps.
          exit 0

      - name: Dump q1 colcon command-prefix/env files
        if: always()
        shell: bash
        run: |
          set +e
          echo "== build/q1 files =="
          find build/q1 -maxdepth 4 -type f | sort || true
          echo ""
          echo "== log/latest_build/q1 files =="
          find log/latest_build/q1 -maxdepth 3 -type f | sort || true

          for f in \
            build/q1/colcon_command_prefix_build.sh \
            log/latest_build/q1/command.log \
            log/latest_build/q1/stdout.log \
            log/latest_build/q1/stderr.log \
            log/latest_build/q1/stdout_stderr.log \
            install/a2_common/share/a2_common/environment/pythonpath.sh \
            install/a2_common/share/a2_common/environment/pythonpath.dsv \
            install/a2_common/share/ament_index/resource_index/parent_prefix_path/a2_common \
            install/mujoco_ros2_bridge/share/ament_index/resource_index/parent_prefix_path/mujoco_ros2_bridge
          do
            echo ""
            echo "----- $f -----"
            if [ -f "$f" ]; then
              sed -n '1,220p' "$f"
            else
              echo "Missing $f"
            fi
          done

          if [ -f build/q1/colcon_command_prefix_build.sh ]; then
            echo ""
            echo "== Probe under q1 command prefix =="
            source /opt/ros/jazzy/setup.bash
            source build/q1/colcon_command_prefix_build.sh
            python3 -c "import os, site; print('ENABLE_USER_SITE:', site.ENABLE_USER_SITE); print('PYTHONNOUSERSITE:', os.environ.get('PYTHONNOUSERSITE', '')); print('USER_SITE:', site.getusersitepackages())"
            python3 -c "import importlib.util, os, sys; spec = importlib.util.find_spec('ament_package'); print('sys.executable:', sys.executable); print('PYTHONPATH:', os.environ.get('PYTHONPATH', '')); print('ament_package:', spec.origin if spec else 'MISSING')"
          fi

      # ── Q1 ────────────────────────────────────────────────────────
      - name: "Q1 — Occupancy Grid Mapping"
        id: q1
        continue-on-error: true
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          export ROS_DOMAIN_ID=11

          PROCESS_PAT="mujoco_sim_node|turtlebot_bridge_node|rviz2|rviz_marker_node|pure_pursuit_node|occupancy_mapper_node|test_occupancy_mapper"
          pkill -9 -f "$PROCESS_PAT" 2>/dev/null || true
          ros2 daemon stop 2>/dev/null || true
          sleep 1

          cleanup() {
            kill $MAPPER_PID $BRINGUP_PID 2>/dev/null || true
            pkill -9 -f "$PROCESS_PAT" 2>/dev/null || true
          }
          trap cleanup EXIT

          ros2 launch q1 turtlebot_bringup.launch.py \
            use_viewer:=false use_map_viz:=false realtime_factor:=2.0 &
          BRINGUP_PID=$!
          sleep 3

          ros2 run q1 occupancy_mapper_node.py &
          MAPPER_PID=$!
          sleep 3

          timeout 90 ros2 run q1 test_occupancy_mapper.py
          exit $?

      # ── Q2 ────────────────────────────────────────────────────────
      - name: "Q2 — Discrete Bayes Localization"
        id: q2
        continue-on-error: true
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          export ROS_DOMAIN_ID=12

          PROCESS_PAT="mujoco_sim_node|turtlebot_bridge_node|rviz2|rviz_marker_node|pure_pursuit_node|bayes_localizer|test_bayes_localizer"
          pkill -9 -f "$PROCESS_PAT" 2>/dev/null || true
          ros2 daemon stop 2>/dev/null || true
          sleep 1

          cleanup() {
            kill $BRINGUP_PID 2>/dev/null || true
            pkill -9 -f "$PROCESS_PAT" 2>/dev/null || true
          }
          trap cleanup EXIT

          ros2 launch q2 q2_bayes_localization.launch.py \
            use_viewer:=false use_map_viz:=false realtime_factor:=2.0 &
          BRINGUP_PID=$!
          sleep 5

          timeout 120 ros2 run q2 test_bayes_localizer.py
          exit $?

      # ── Q3 ────────────────────────────────────────────────────────
      - name: "Q3 — RRT Path Planning"
        id: q3
        continue-on-error: true
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          export ROS_DOMAIN_ID=13

          PROCESS_PAT="mujoco_sim_node|turtlebot_bridge_node|rviz2|rviz_marker_node|pure_pursuit_node|rrt_planner|test_rrt_planner"
          pkill -9 -f "$PROCESS_PAT" 2>/dev/null || true
          ros2 daemon stop 2>/dev/null || true
          sleep 1

          cleanup() {
            kill $BRINGUP_PID 2>/dev/null || true
            pkill -9 -f "$PROCESS_PAT" 2>/dev/null || true
          }
          trap cleanup EXIT

          ros2 launch q3 q3_rrt_planning.launch.py \
            use_viewer:=false use_map_viz:=false &
          BRINGUP_PID=$!
          sleep 5

          timeout 300 ros2 run q3 test_rrt_planner.py --ros-args -p plan_timeout_s:=60.0
          exit $?

      # ── Summary ───────────────────────────────────────────────────
      - name: Upload colcon logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs
          path: |
            log/**/*
            build/**/colcon_command_prefix_*.sh
            build/**/colcon_command_prefix_*.ps1
            build/**/colcon_command_prefix_*.ps1.env
            build/*/CMakeCache.txt
            build/*/ament_cmake_package_templates/*
            install/a2_common/share/a2_common/**/*
            install/*/share/ament_index/resource_index/parent_prefix_path/*
          if-no-files-found: warn

      - name: Results summary
        if: always()
        run: |
          Q1="${{ steps.q1.outcome }}"
          Q2="${{ steps.q2.outcome }}"
          Q3="${{ steps.q3.outcome }}"
          echo "Q1 — Occupancy Grid Mapping   : $Q1"
          echo "Q2 — Bayes Localization       : $Q2"
          echo "Q3 — RRT Path Planning        : $Q3"
          if [ "$Q1" != "success" ] || [ "$Q2" != "success" ] || [ "$Q3" != "success" ]; then
            exit 1
          fi
